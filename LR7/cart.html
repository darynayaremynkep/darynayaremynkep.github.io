<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
            
            height: 100vh;      
            width: 100vw;
            overflow: hidden; 
            box-sizing: border-box;
        }

        h1 {
            margin: 8vh 0 2vh; 
            font-size: 28px;
            text-transform: uppercase;
            font-weight: normal;
            color: #333;
            text-align: center;
        }

        .image-container {
            flex-grow: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow: hidden;
        }

        .image-container img {
            max-width: 80%;
            max-height: 60vh; 
            height: auto;
            object-fit: contain; 
        }

        .back-link {
            margin-bottom: 5vh; 
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: 18px;
            padding: 10px 20px;
            border: 2px solid black;
            border-radius: 5px;
        }

        .back-link:hover {
            background-color: #232526;
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>тут мала бути ваша корзина :(</h1>

    <div class="image-container">
        <img src="image/cat.jpg" alt="Crying cat">
    </div>

    <a href="index.html" class="back-link">⬅ Назад до товарів</a>

</body>
</html>
