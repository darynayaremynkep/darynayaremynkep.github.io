<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="task4.css">
</head>
<body>
<div class="main-container">
    <div class="calculator calc-float">
        <div class="top-bar"></div>
        <div class="header">Casio 3234</div>
        <div class="body">
            <input type="text" class="input-field" value="лоррпапр">
            <div class="solar"></div>
            <div class="buttons-area">
                <button>7</button><button>8</button><button>9</button><button>+</button>
                <button>4</button><button>5</button><button>6</button><button>-</button>
                <button>1</button><button>2</button><button>3</button><button>/</button>
                <button>,</button><button>0</button><button>=</button><button>*</button>
            </div>
        </div>
    </div>

    <div class="calculator calc-pos">
        <div class="top-bar"></div>
        <div class="header">Casio 3234</div>
        <div class="body">
            <input type="text" class="input-field" value="лоррпапр">
            <div class="solar"></div>
            <div class="btns-pos">
                <button class="r1 c1">7</button><button class="r1 c2">8</button>
                <button class="r1 c3">9</button><button class="r1 c4">+</button>
                <button class="r2 c1">4</button><button class="r2 c2">5</button>
                <button class="r2 c3">6</button><button class="r2 c4">-</button>
                <button class="r3 c1">1</button><button class="r3 c2">2</button>
                <button class="r3 c3">3</button><button class="r3 c4">/</button>
                <button class="r4 c1">,</button><button class="r4 c2">0</button>
                <button class="r4 c3">=</button><button class="r4 c4">*</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
